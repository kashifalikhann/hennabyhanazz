name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_STRIPE_KEY: ${{ secrets.PUBLIC_STRIPE_KEY }}
          PUBLIC_GTM_ID: ${{ secrets.PUBLIC_GTM_ID }}
          PUBLIC_FB_PIXEL_ID: ${{ secrets.PUBLIC_FB_PIXEL_ID }}
          PUBLIC_CONTACT_EMAIL: henna@hennabyhanazz.com
          PUBLIC_WHATSAPP_NUMBER: 34655729113
          PUBLIC_INSTAGRAM_URL: https://www.instagram.com/hennabyhanazz/
          CONTACT_EMAIL: henna@hennabyhanazz.com
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
